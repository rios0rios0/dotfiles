name: Validate Dotfiles

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-shellcheck:
    name: Lint (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: make lint-shellcheck

  lint-templates:
    name: Lint (Go templates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: .github/ci/cmd/tmplcheck/go.sum
      - name: Download dependencies
        working-directory: .github/ci/cmd/tmplcheck
        run: go mod download
      - name: Validate template syntax
        run: make lint-templates

  lint-python:
    name: Lint (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ruff
        run: pip install ruff
      - name: Lint embedded Python
        run: make lint-python

  lint-powershell:
    name: Lint (PowerShell)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PowerShell
        run: |
          sudo apt-get install -y wget apt-transport-https software-properties-common
          source /etc/os-release
          wget -q "https://packages.microsoft.com/config/ubuntu/$VERSION_ID/packages-microsoft-prod.deb"
          sudo dpkg -i packages-microsoft-prod.deb
          rm packages-microsoft-prod.deb
          sudo apt-get update
          sudo apt-get install -y powershell
      - name: Install PSScriptAnalyzer
        run: pwsh -Command "Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser"
      - name: Lint PowerShell scripts
        run: make lint-powershell

  lint-syntax:
    name: Lint (YAML/JSON)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: |
          sudo apt-get install -y jq
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Validate YAML/JSON syntax
        run: make lint-syntax

  test-template-render:
    name: Test (template rendering)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Test template rendering with mock op
        run: make test-template-render

  test-chezmoiignore:
    name: Test (chezmoiignore logic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin
      - name: Test platform file inclusion
        run: make test-chezmoiignore

  test-script-order:
    name: Test (script ordering)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify script dependency order
        run: make test-script-order

  test-modify-scripts:
    name: Test (modify scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get install -y jq python3
      - name: Test modify scripts
        run: make test-modify-scripts

  sast:
    name: SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          wget -qO gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/
          rm gitleaks.tar.gz
      - name: Run gitleaks
        run: gitleaks detect --source . --verbose
