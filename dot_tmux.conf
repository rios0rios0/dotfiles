# Mobile-friendly tmux configuration for Termux (Android)
# Optimized for touchscreen keyboards with limited keys

# --- Prefix ---
# Change prefix from Ctrl+b to Ctrl+a (easier to reach on Termux extra-keys)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- General ---
set -g mouse on                    # tap panes, drag borders, scroll with swipe
set -g history-limit 10000         # generous scrollback
set -g base-index 1                # windows start at 1 (0 is far from thumbs)
setw -g pane-base-index 1          # panes start at 1
set -sg escape-time 10             # minimal delay after ESC (extra-keys ESC shouldn't lag)
set -g renumber-windows on         # renumber when a window is closed

# --- Intuitive splits ---
# - is already on the Termux extra-keys row
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Pane navigation (arrow keys are on extra-keys row) ---
bind Up select-pane -U
bind Down select-pane -D
bind Left select-pane -L
bind Right select-pane -R

# --- Status bar (compact for small screens) ---
set -g status-position bottom
set -g status-style "bg=colour235,fg=colour248"
set -g status-left " #S "
set -g status-left-length 15
set -g status-right " %H:%M "
set -g status-right-length 10
setw -g window-status-current-style "bg=colour238,fg=colour15,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "

# --- Quality of life ---
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"
